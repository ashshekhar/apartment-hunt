name: one-lakefront-1br-hunt

on:
  schedule:
    # Pacific times, computed for PDT (UTC-7); shift 1h in winter (PST).
    # UTC 16,18,20,22,0,2,4 = 9,11AM,1,3,5,7,9PM PT (every 2h, daytime);
    # UTC 10 = ~3AM PT (one overnight run).
    - cron: "0 0,2,4,10,16,18,20,22 * * *"
  workflow_dispatch: {}         # manual "Run workflow" button

permissions:
  contents: write               # allow committing updated state.json

concurrency:
  group: apartment-hunt
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hunt
        run: python3 hunt.py

      - name: Persist state
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update hunt state"
            git push
          else
            echo "state unchanged"
          fi
