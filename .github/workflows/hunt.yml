name: one-lakefront-1br-hunt

on:
  schedule:
    # Hourly 9AM-9PM PT + overnight 1/3/5AM PT. Cron is UTC (PDT here; shifts 1h in winter).
    # UTC 16-23,0-4 = 9AM-9PM PT hourly; UTC 8,10,12 = 1/3/5AM PT.
    - cron: "0 0-4,8,10,12,16-23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: apartment-hunt
  cancel-in-progress: false

jobs:
  hunt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run hunt
        run: python3 hunt.py

      - name: Persist state
        run: |
          if ! git diff --quiet -- state.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update hunt state"
            git push
          else
            echo "state unchanged"
          fi
